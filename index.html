<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스레드 방향성 진단 리포트 — 마잘남</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161c; --surface:#1d2029; --surface-2:#262a35;
    --line:rgba(242,238,228,0.09);
    --text:#f2eee4; --muted:#9a9caa;
    --gold:#d9a441; --coral:#e2624b; --sage:#6fa989;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}
  body{display:flex;justify-content:center;padding:44px 20px 90px;}
  .stage{width:100%;max-width:580px;}
  .mono{font-family:'JetBrains Mono',monospace;}

  .thread-wrap{width:100%;height:60px;margin-bottom:24px;}
  .thread-wrap svg{width:100%;height:100%;display:block;}
  .thread-path{fill:none;stroke:var(--gold);stroke-width:2.5;stroke-linecap:round;transition:d .6s ease,stroke .6s ease;}

  .eyebrow{font-size:12.5px;letter-spacing:.1em;color:var(--gold);font-weight:600;margin-bottom:14px;text-transform:uppercase;}
  h1{font-family:'Fraunces','Pretendard',serif;font-weight:600;font-size:32px;line-height:1.32;letter-spacing:-.01em;margin-bottom:16px;}
  .lead{color:var(--muted);font-size:15.5px;line-height:1.75;margin-bottom:28px;}
  .lead strong{color:var(--text);font-weight:600;}

  .meta-row{display:flex;gap:16px;margin-bottom:34px;font-size:12.5px;color:var(--muted);flex-wrap:wrap;}
  .meta-row span{display:flex;align-items:center;gap:6px;}
  .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;}

  button{font-family:inherit;cursor:pointer;border:none;}
  .btn-primary{width:100%;background:var(--gold);color:#14161c;font-size:15.5px;font-weight:700;padding:16px 24px;border-radius:10px;transition:transform .15s,background .15s;}
  .btn-primary:hover{background:#e6b559;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  .progress-track{width:100%;height:3px;background:var(--line);border-radius:3px;margin-bottom:30px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--gold);width:0%;transition:width .4s ease;}
  .q-count{font-size:12.5px;color:var(--muted);margin-bottom:8px;letter-spacing:.02em;display:flex;justify-content:space-between;}

  .q-card{display:none;}
  .q-card.active{display:block;animation:fadein .35s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .q-cat-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--gold);background:rgba(217,164,65,.12);padding:4px 9px;border-radius:100px;margin-bottom:14px;letter-spacing:.02em;}
  .q-text{font-size:20px;line-height:1.48;font-weight:600;margin-bottom:24px;letter-spacing:-.01em;}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .option{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:15px 17px;font-size:14.5px;line-height:1.55;color:var(--text);transition:border-color .15s,background .15s;}
  .option:hover{border-color:var(--gold);background:var(--surface-2);}
  .back-link{font-size:12.5px;color:var(--muted);background:none;padding:4px 0;}
  .back-link:hover{color:var(--text);}

  #result{display:none;}
  .report-head{border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:24px;background:var(--surface);}
  .report-head-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}
  .report-head-row + .report-head-row{margin-top:6px;}

  .score-hero{text-align:center;padding:6px 0 24px;}
  .score-num{font-family:'Fraunces',serif;font-weight:900;font-size:68px;line-height:1;letter-spacing:-.02em;}
  .score-label{font-size:12.5px;color:var(--muted);margin-top:8px;letter-spacing:.04em;}
  .tier-name{text-align:center;font-size:22px;font-weight:700;margin-bottom:12px;}
  .purpose-line{text-align:center;font-size:13px;color:var(--gold);margin-bottom:14px;}
  .tier-desc{text-align:center;color:var(--muted);font-size:14.5px;line-height:1.75;margin-bottom:30px;}
  .tier-desc strong{color:var(--text);}

  .funnel-strip{display:flex;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:26px;}
  .funnel-step{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--line);}
  .funnel-step:last-child{border-right:none;}
  .funnel-step .label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .funnel-step .val{font-size:18px;font-weight:700;}
  .funnel-step.weak .val{color:var(--coral);}
  .funnel-step.mid .val{color:var(--gold);}
  .funnel-step.strong .val{color:var(--sage);}

  .breakdown{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 20px;margin-bottom:22px;}
  .breakdown-title{font-size:12.5px;color:var(--muted);margin-bottom:16px;letter-spacing:.03em;}
  .bd-row{margin-bottom:13px;}
  .bd-row:last-child{margin-bottom:0;}
  .bd-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .bd-top span:last-child{color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;}
  .bd-track{height:5px;background:var(--line);border-radius:4px;overflow:hidden;}
  .bd-fill{height:100%;background:var(--gold);border-radius:4px;transition:width .6s ease;}
  .bd-fill.weak{background:var(--coral);}
  .bd-fill.strong{background:var(--sage);}

  .gate-block{background:var(--surface);border:1px dashed var(--line);border-radius:var(--radius);padding:24px 20px;margin-bottom:22px;}
  .gate-title{font-size:17px;font-weight:700;margin-bottom:8px;}
  .gate-copy{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:18px;}
  .gate-form{display:flex;gap:8px;flex-wrap:wrap;}
  .gate-form input{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:13px 14px;color:var(--text);font-size:14px;}
  .gate-form input::placeholder{color:var(--muted);}
  .gate-form button{background:var(--gold);color:#14161c;font-weight:700;font-size:14px;padding:0 20px;border-radius:9px;white-space:nowrap;}
  .gate-form button:hover{background:#e6b559;}
  .gate-note{font-size:11.5px;color:var(--muted);margin-top:10px;}

  #detailReport{display:none;}
  .deep-dive{background:var(--surface);border:1px solid var(--gold);border-radius:var(--radius);padding:22px 20px;margin-bottom:20px;}
  .deep-dive-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--bg);background:var(--gold);padding:4px 10px;border-radius:100px;margin-bottom:14px;}
  .deep-dive-title{font-size:18px;font-weight:700;margin-bottom:10px;line-height:1.4;}
  .deep-dive-copy{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:14px;}
  .day-ref{display:flex;align-items:center;gap:10px;background:var(--surface-2);border-radius:9px;padding:12px 14px;font-size:13.5px;}
  .day-ref .day-num{font-family:'Fraunces',serif;font-weight:900;font-size:22px;color:var(--gold);}

  .cta-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;margin-bottom:14px;}
  .cta-tag{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.04em;color:var(--bg);background:var(--gold);padding:4px 10px;border-radius:100px;margin-bottom:14px;}
  .cta-title{font-size:19px;font-weight:700;margin-bottom:8px;line-height:1.4;}
  .cta-copy{font-size:14.5px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
  .cta-btn{display:block;width:100%;text-align:center;text-decoration:none;background:var(--gold);color:#14161c;font-weight:700;font-size:15px;padding:15px;border-radius:9px;}
  .cta-btn:hover{background:#e6b559;}
  .cta-btn.secondary{background:transparent;border:1px solid var(--line);color:var(--text);margin-top:10px;}
  .cta-btn.secondary:hover{border-color:var(--gold);}

  .cta-block.impact{
    border:1.5px solid var(--gold);
    background:linear-gradient(165deg, rgba(217,164,65,0.14), var(--surface) 55%);
    box-shadow:0 14px 36px rgba(217,164,65,0.14);
    padding:30px 24px;
  }
  .cta-block.impact .cta-tag{font-size:12.5px;padding:5px 12px;}
  .cta-block.impact .cta-title{font-size:24px;letter-spacing:-.01em;}
  .cta-block.impact .cta-copy{font-size:15px;}
  .cta-block.impact .cta-btn{font-size:16.5px;padding:18px;box-shadow:0 8px 20px rgba(217,164,65,0.35);}

  .verdict-block{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
  .verdict-row{padding:22px 20px;}
  .verdict-row.problem{background:rgba(226,98,75,0.1);border-bottom:1px solid var(--line);}
  .verdict-row.solution{background:rgba(217,164,65,0.1);}
  .verdict-label{font-size:11.5px;letter-spacing:.05em;display:block;margin-bottom:9px;font-weight:700;}
  .verdict-row.problem .verdict-label{color:var(--coral);}
  .verdict-row.solution .verdict-label{color:var(--gold);}
  .verdict-value{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin-bottom:9px;line-height:1.3;letter-spacing:-.01em;}
  .verdict-copy{font-size:13.5px;color:var(--muted);line-height:1.65;}

  .util-row{display:flex;gap:10px;margin-top:20px;}
  .util-row button{flex:1;background:transparent;border:1px solid var(--line);color:var(--muted);font-size:12.5px;padding:11px;border-radius:9px;}
  .util-row button:hover{color:var(--text);border-color:var(--gold);}

  footer{text-align:center;color:var(--muted);font-size:11.5px;margin-top:40px;}

  @media (max-width:480px){
    h1{font-size:26px;} .q-text{font-size:18px;} .score-num{font-size:56px;}
    .funnel-strip{flex-wrap:wrap;} .funnel-step{flex:1 1 50%;border-bottom:1px solid var(--line);}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  @media print{
    body{padding:0;background:#fff;color:#111;}
    .thread-wrap,.util-row,footer,#intro,#quiz{display:none!important;}
    .stage{max-width:100%;}
    * { color:#111 !important; background:#fff !important; border-color:#ccc !important; }
  }
</style>
</head>
<body>
<div class="stage">

  <div class="thread-wrap">
    <svg viewBox="0 0 580 60" preserveAspectRatio="none">
      <path id="threadPath" class="thread-path" d="M0,30 Q145,30 290,30 T580,30"/>
    </svg>
  </div>

  <!-- INTRO -->
  <div id="intro">
    <p class="eyebrow">스레드 방향성 체크리스트</p>
    <h1>현재 스레드, 제대로 하고 있나요?</h1>
    <p class="lead">
      노출 → 유입 → 탐색 → 전환. 16개 질문으로 지금 계정이 이 흐름의 어느 단계에서 막혀있는지 짚어드려요.
    </p>
    <div class="meta-row">
      <span><span class="dot"></span>2분 소요</span>
      <span><span class="dot"></span>16문항</span>
      <span><span class="dot"></span>맞춤 리포트 제공</span>
    </div>
    <button class="btn-primary" onclick="startQuiz()">진단 시작하기</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" style="display:none;">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="q-count"><span id="qCount">1 / 17</span><span id="qCat"></span></div>
    <div id="qContainer"></div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="report-head">
      <div class="report-head-row"><span>진단 ID</span><span class="mono" id="reportId"></span></div>
      <div class="report-head-row"><span>진단일</span><span class="mono" id="reportDate"></span></div>
    </div>

    <div class="score-hero">
      <div class="score-num" id="scoreNum">0</div>
      <div class="score-label">종합 진단 점수 / 48</div>
    </div>
    <div class="purpose-line" id="purposeLine"></div>
    <div class="tier-name" id="tierName"></div>
    <p class="tier-desc" id="tierDesc"></p>

    <div class="funnel-strip" id="funnelStrip"></div>

    <div class="breakdown">
      <div class="breakdown-title">8개 영역 상세 리포트 — 뭐가 부족하고 뭐가 필요한지</div>
      <div id="breakdownRows"></div>
    </div>

    <div id="ctaArea"></div>

    <div class="util-row">
      <button onclick="window.print()">리포트 저장(인쇄/PDF)</button>
      <button onclick="restartQuiz()">다시 진단하기</button>
    </div>
  </div>

  <footer>마잘남 — 스레드 컨설팅 &amp; 대행</footer>
</div>

<script>
const categories = {
  profile: {
    name: "정체성·프로필",
    day: 1, dayTitle: "프로필 세팅 & 주제 한가지 정하기",
    weakAdvice: "프로필만 보고 '이 사람이 뭘 하는 사람인지' 3초 안에 파악이 안 되고 있을 확률이 높아요. 정체성·신뢰도(하는 일)·신뢰도(수치)·CTA 4줄이 다 채워져 있는지부터 점검이 필요해요.",
    midAdvice: "정체성·신뢰도 요소가 일부는 있지만 임팩트가 약해요. 수치나 결과를 더 구체적으로 채우면 신뢰도가 확 올라가요.",
    strongAdvice: "프로필 자체는 첫인상 역할을 잘 하고 있어요. 이제는 프로필로 들어온 사람이 실제로 액션하게 만드는 다음 단계로 넘어갈 시점이에요."
  },
  persona: {
    name: "꿈의 고객 명확성",
    day: 2, dayTitle: "꿈의 고객 정의하기",
    weakAdvice: "글을 쓸 때 상상하는 '한 사람'이 아직 흐릿해요. 페르소나와 꿈의 고객을 구분해서 이름·나이·고민까지 구체적으로 그려보는 작업이 먼저예요.",
    midAdvice: "타겟이 어느 정도는 있지만 '왜 나한테 돈을 내는지' 이유가 아직 흐릿해요. 그 이유를 한 문장으로 정리해보세요.",
    strongAdvice: "타겟이 명확한 편이에요. 이제 그 사람이 '왜 나한테' 돈을 내야 하는지, 신뢰 이유를 더 뾰족하게 다듬을 차례예요."
  },
  topic: {
    name: "소재 발굴력",
    day: 3, dayTitle: "주제 리스트 10개 만들기",
    weakAdvice: "매번 소재가 막막한 상태일 가능성이 커요. 타겟이 궁금해할 질문 10개를 미리 뽑아두는 것만으로도 이 문제는 대부분 해결돼요.",
    midAdvice: "소재가 가끔 막히는 편이에요. 질문 리스트를 미리 뽑아 쌓아두면 이 텀이 줄어들어요.",
    strongAdvice: "소재는 마르지 않는 편이에요. 다음은 그 소재들을 얼마나 '전환되는 구조'로 배치하는지가 관건이에요."
  },
  hook: {
    name: "후킹력",
    day: 4, dayTitle: "후킹 제목 훈련",
    weakAdvice: "첫 문장에서 스크롤이 멈추지 않고 있을 가능성이 높아요. 아무리 뒤 내용이 좋아도 첫 줄에서 이탈하면 의미가 없어요. 잘 뜬 글 5개를 캡처해서 구조만 벤치마킹하는 훈련이 필요해요.",
    midAdvice: "훅이 가끔은 먹히는 정도예요. 잘 뜬 글 벤치마킹을 루틴으로 만들면 적중률이 올라가요.",
    strongAdvice: "훅 설계는 잘 되어 있는 편이에요. 이제 훅 다음에 오는 본문·CTA 연결이 자연스러운지가 중요해져요."
  },
  empathy: {
    name: "공감 구조",
    day: 9, dayTitle: "공감 콘텐츠 작성",
    weakAdvice: "글이 감정적으로 와닿기보다 정보 전달에 가까울 수 있어요. '상황 → 감정 → 인정' 3단 구조를 의식적으로 연습하면 공감 반응이 확 달라져요.",
    midAdvice: "공감 구조를 어느 정도는 지키고 있어요. '상황→감정→인정' 순서를 더 의식적으로 지키면 반응이 한 단계 더 올라가요.",
    strongAdvice: "공감 포인트를 잘 짚는 편이에요. 공감으로 모은 관심을 전환까지 이어붙이는 CTA 설계가 다음 과제예요."
  },
  cta: {
    name: "CTA 설계",
    day: 7, dayTitle: "CTA(행동유도) 설계",
    weakAdvice: "글은 쓰는데 '그다음 행동'을 만들어주지 못하고 있을 가능성이 커요. 팔로우·저장·댓글 CTA를 상황별로 최소 3가지는 준비해두는 게 필요해요.",
    midAdvice: "CTA를 가끔 넣긴 하지만 매번 같은 문구일 수 있어요. 글 목적(팔로우/저장/댓글)별로 CTA를 나눠보세요.",
    strongAdvice: "CTA는 잘 넣고 있는 편이에요. 이제 CTA 문구를 목적(팔로우/댓글/DM)별로 세분화하면 전환율이 더 올라갈 거예요."
  },
  keycontent: {
    name: "키 콘텐츠·브랜딩",
    day: 12, dayTitle: "키 컨텐츠 제작(브랜딩 글)",
    weakAdvice: "'이 사람은 전문가다'라고 각인시키는 대표 글이 아직 없을 가능성이 커요. 반전형·숫자 리스트형·정보형 중 하나를 골라 브랜딩 글을 쌓아야 해요.",
    midAdvice: "브랜딩 글이 있긴 하지만 반응이 약한 편이에요. 구조(반전형/숫자형/정보형)를 바꿔서 다시 시도해보세요.",
    strongAdvice: "전문성을 각인시키는 콘텐츠는 있는 편이에요. 이 글들을 프로필 상단에 고정하거나 반복 노출시키는 전략이 다음 단계예요."
  },
  funnel: {
    name: "퍼널 건강도(발행량·전환 체감)",
    day: 12, dayTitle: "노출 → 유입 → 탐색 → 전환 구조 점검",

    options:[{t:"아니요, 뭐 하는 사람인지 저도 헷갈릴 때가 있어요",s:1},{t:"대충은 알 것 같아요",s:2},{t:"네, 한 줄로 딱 정리돼 있어요",s:3}] },
  { cat:"profile", text:"프로필에 '이 사람 진짜 실력 있네' 싶은 근거(수치·이력·후기)가 있어요?",
    options:[{t:"딱히 없어요",s:1},{t:"몇 개 있긴 해요",s:2},{t:"구체적인 숫자로 딱 박혀있어요",s:3}] },

  { cat:"persona", text:"글 쓸 때 머릿속에 '이 사람한테 말한다' 하는 특정 인물이 떠올라요?",
    options:[{t:"그냥 아무나 보라고 써요",s:1},{t:"막연히 있긴 해요",s:2},{t:"그 사람 나이·고민까지 그려져요",s:3}] },
  { cat:"persona", text:"그 사람이 왜 하필 나한테 돈을 써야 하는지, 한 문장으로 바로 말할 수 있어요?",
    options:[{t:"말이 잘 안 나와요",s:1},{t:"어느 정도는요",s:2},{t:"바로 튀어나와요",s:3}] },

  { cat:"topic", text:"오늘 뭐 올릴지 고민하다가 그냥 안 올린 날, 최근에 있었어요?",
    options:[{t:"자주 있어요",s:1},{t:"가끔 있어요",s:2},{t:"거의 없어요, 쓸 게 늘 있어요",s:3}] },
  { cat:"topic", text:"타겟이 궁금해할 만한 질문을 미리 적어놓고 그걸 소재로 쓰는 편이에요?",
    options:[{t:"그런 거 안 해봤어요",s:1},{t:"해본 적은 있어요",s:2},{t:"리스트 만들어서 계속 채워요",s:3}] },

  { cat:"hook", text:"첫 문장 쓸 때 '이거 스크롤 멈추고 읽을까?' 고민하고 써요, 아니면 그냥 써요?",
    options:[{t:"그냥 써요",s:1},{t:"가끔 신경 써요",s:2},{t:"첫 줄에 제일 공들여요",s:3}] },
  { cat:"hook", text:"잘 터진 글 보면 '이거 왜 잘 됐지' 뜯어보고 내 걸로 바꿔서 써본 적 있어요?",
    options:[{t:"없어요",s:1},{t:"몇 번요",s:2},{t:"습관처럼 해요",s:3}] },

  { cat:"empathy", text:"공감글 쓸 때 '상황 → 감정 → 나도 그래' 순서로 흘러가게 신경 써요?",
    options:[{t:"그냥 느낌 가는 대로 써요",s:1},{t:"어느 정도는 순서를 지켜요",s:2},{t:"의식적으로 이 순서로 짜요",s:3}] },
  { cat:"empathy", text:"댓글에 '내 얘기 같다', '완전 공감돼요' 이런 반응 자주 받아요?",
    options:[{t:"거의 못 받아봤어요",s:1},{t:"가끔 받아요",s:2},{t:"자주 받는 편이에요",s:3}] },

  { cat:"cta", text:"글 끝날 때 팔로우·저장·댓글 중 뭐라도 유도하는 문구 넣어요?",
    options:[{t:"거의 안 넣어요",s:1},{t:"가끔요",s:2},{t:"거의 항상요",s:3}] },
  { cat:"cta", text:"그 CTA, 매번 똑같은 말 아니고 글마다 다르게 바꿔서 써요?",
    options:[{t:"맨날 똑같아요",s:1},{t:"가끔 바꿔요",s:2},{t:"목적 따라 다르게 써요",s:3}] },

  { cat:"keycontent", text:"'이 사람 진짜 전문가구나' 싶게 만든 대표 글, 하나쯤 있어요?",
    options:[{t:"없어요",s:1},{t:"있긴 한데 반응이 약해요",s:2},{t:"있고 그걸로 계속 유입돼요",s:3}] },
  { cat:"keycontent", text:"그 글, 프로필 상단에 고정해두거나 계속 다시 노출시켜요?",
    options:[{t:"그냥 묻혀있어요",s:1},{t:"가끔 다시 올려요",s:2},{t:"고정해두고 계속 활용해요",s:3}] },

  { cat:"funnel", text:"요즘 발행 빈도, 스스로 만족해요?",
    options:[{t:"주 1~2개도 버거워요",s:1},{t:"주 3~5개는 올려요",s:2},{t:"거의 매일 올려요",s:3}] },
  { cat:"funnel", text:"프로필 링크 눌러서 실제 문의·상담·구매까지 이어지는 거, 체감돼요?",
    options:[{t:"거의 못 느껴봤어요",s:1},{t:"가끔 느껴요",s:2},{t:"꾸준히 느껴져요",s:3}] },
];

let current = -1;
const answers = new Array(questions.length).fill(null);
let purposeAnswer = null;

function startQuiz(){
  document.getElementById('intro').style.display='none';
  document.getElementById('quiz').style.display='block';
  current = -1;
  renderQuestion();
}

function totalSteps(){ return questions.length + 1; }

function renderQuestion(){
  const container = document.getElementById('qContainer');
  const stepIndex = current + 2;
  document.getElementById('qCount').textContent = `${stepIndex} / ${totalSteps()}`;

  if(current === -1){
    document.getElementById('qCat').textContent = '목적 체크';
    container.innerHTML = `
      <div class="q-card active">
        <span class="q-cat-tag">START</span>
        <div class="q-text">${purposeQuestion.text}</div>
        <div class="options">
          ${purposeQuestion.options.map((o,i)=>`<button class="option" onclick="selectPurpose('${o.v}')">${o.t}</button>`).join('')}
        </div>
      </div>`;
    document.getElementById('progressFill').style.width = '0%';
    updateThread();
    return;
  }

  const q = questions[current];
  document.getElementById('qCat').textContent = categories[q.cat].name;
  container.innerHTML = `
    <div class="q-card active">
      <span class="q-cat-tag">${categories[q.cat].name}</span>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i)=>`<button class="option ${answers[current]===i?'selected':''}" onclick="selectOption(${i})">${o.t}</button>`).join('')}
      </div>
      <button class="back-link" onclick="goBack()">← 이전 질문</button>
    </div>`;
  document.getElementById('progressFill').style.width = `${((current+1)/questions.length)*100}%`;
  updateThread();
}

function selectPurpose(v){
  purposeAnswer = v;
  current = 0;
  renderQuestion();
}

function selectOption(i){
  answers[current] = i;
  if(current < questions.length - 1){
    current++;
    renderQuestion();
  } else {
    document.getElementById('progressFill').style.width = '100%';
    setTimeout(showResult, 250);
  }
}

function goBack(){
  if(current === 0){ current = -1; renderQuestion(); }
  else if(current > 0){ current--; renderQuestion(); }
}

function updateThread(){
  const path = document.getElementById('threadPath');
  const answered = (purposeAnswer?1:0) + answers.filter(a=>a!==null).length;
  const progress = answered / totalSteps();
  const amp = 20 * (1 - progress*0.7);
  path.setAttribute('d', `M0,30 Q145,${30-amp} 290,30 T580,30`);
}

function restartQuiz(){
  current = -1; purposeAnswer = null; answers.fill(null);
  document.getElementById('result').style.display='none';
  document.getElementById('intro').style.display='block';
  document.getElementById('quiz').style.display='none';
  document.getElementById('threadPath').setAttribute('d','M0,30 Q145,30 290,30 T580,30');
}

let lastReport = null;

function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';

  const total = answers.reduce((sum,ansIdx,i)=> sum + questions[i].options[ansIdx].s, 0);
  document.getElementById('scoreNum').textContent = total;

  const rid = 'MJN-' + Math.random().toString(36).slice(2,7).toUpperCase();
  document.getElementById('reportId').textContent = rid;
  document.getElementById('reportDate').textContent = new Date().toLocaleDateString('ko-KR');

  const purposeLabel = {money:"수익화 / 본업 확장", brand:"퍼스널브랜딩", follower:"팔로워 / 영향력 증대", unclear:"목적 아직 미정"}[purposeAnswer];
  document.getElementById('purposeLine').textContent = `진단 목적 · ${purposeLabel}`;

  const path = document.getElementById('threadPath');
  const norm = (total-16)/(48-16);
  const amp = 18*(1-norm);
  path.setAttribute('d', `M0,30 Q145,${30-amp} 290,30 T580,30`);
  path.style.stroke = norm>0.65?'var(--sage)':norm>0.35?'var(--gold)':'var(--coral)';

  let tier;
  if(total<=27) tier='tangled'; else if(total<=38) tier='halfway'; else tier='aligned';

  const tiers = {
    tangled:{name:"🧶 완전 엉킨 실타래",
      desc:"지금 단계에서는 콘텐츠 양을 늘리는 게 답이 아니에요. <strong>방향과 구조</strong>부터 다시 세워야, 그 다음에 쓰는 글들이 힘을 받아요."},
    halfway:{name:"🧵 절반은 풀린 상태",
      desc:"기본 구조는 잡혀 있어요. 근데 <strong>특정 지점에서 새고 있어요.</strong> 아래 약점 영역만 정확히 메우면 흐름이 확 달라질 단계예요."},
    aligned:{name:"✨ 잘 정리된 실타래",
      desc:"방향·구조·전환까지 대체로 잡혀 있어요. 지금은 <strong>양보다 최적화</strong> — 미세 조정으로 성과를 더 끌어올릴 시점이에요."}
  };
  document.getElementById('tierName').textContent = tiers[tier].name;
  document.getElementById('tierDesc').innerHTML = tiers[tier].desc;

  const catScores = {};
  Object.keys(categories).forEach(cid=>{
    const idxs = questions.map((q,i)=>q.cat===cid?i:null).filter(x=>x!==null);
    const sum = idxs.reduce((s,i)=> s + questions[i].options[answers[i]].s, 0);
    catScores[cid] = { avg: sum/idxs.length, count: idxs.length, sum };
  });

  const bd = document.getElementById('breakdownRows');
  bd.innerHTML = Object.keys(categories).map(cid=>{
    const c = catScores[cid];
    const cat = categories[cid];
    const pct = (c.avg/3)*100;
    const isWeak = c.avg < 1.67, isStrong = c.avg >= 2.34;
    const cls = isWeak ? 'weak' : isStrong ? 'strong' : '';
    const label = isWeak ? '부족한 점' : isStrong ? '잘하고 있는 점' : '보완 포인트';
    const labelColor = isWeak ? 'var(--coral)' : isStrong ? 'var(--sage)' : 'var(--gold)';
    const advice = isWeak ? cat.weakAdvice : isStrong ? cat.strongAdvice : cat.midAdvice;
    return `<div class="bd-row" style="margin-bottom:22px;">
      <div class="bd-top"><span>${cat.name}</span><span>${c.avg.toFixed(1)} / 3.0</span></div>
      <div class="bd-track" style="margin-bottom:10px;"><div class="bd-fill ${cls}" style="width:${pct}%"></div></div>
      <p style="font-size:13px;line-height:1.7;color:var(--muted);">
        <span style="color:${labelColor};font-weight:700;">${label}</span> — ${advice}
      </p>
    </div>`;
  }).join('');

  const funnelMap = [
    { label:"노출", score: questions[14].options[answers[14]].s },
    { label:"유입", score: catScores.hook.avg },
    { label:"탐색", score: catScores.cta.avg },
    { label:"전환", score: questions[15].options[answers[15]].s },
  ];
  document.getElementById('funnelStrip').innerHTML = funnelMap.map(f=>{
    const cls = f.score < 1.67 ? 'weak' : f.score >= 2.34 ? 'strong' : 'mid';
    return `<div class="funnel-step ${cls}"><div class="label">${f.label}</div><div class="val">${f.score.toFixed(1)}</div></div>`;
  }).join('');

  let weakestId = Object.keys(catScores)[0];
  Object.keys(catScores).forEach(cid=>{ if(catScores[cid].avg < catScores[weakestId].avg) weakestId = cid; });
  let strongestId = Object.keys(catScores)[0];
  Object.keys(catScores).forEach(cid=>{ if(catScores[cid].avg > catScores[strongestId].avg) strongestId = cid; });

  lastReport = { total, tier, purposeAnswer, weakestId, strongestId, catScores };

  renderCTA(tier, purposeAnswer, weakestId);
}

  const html = `
    <div class="cta-block impact">
      <span class="cta-tag">🎁 지금 바로, 무료</span>
      <div class="cta-title">무료 전자책 · 무료 강의 받으러 가기</div>
      <p class="cta-copy">지금 바로 받아볼 수 있는 자료부터 챙겨보세요.<br>참여코드 <strong style="color:var(--gold);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;">0055</strong> 입력하고 들어오시면 돼요.</p>
      <a class="cta-btn" href="https://open.kakao.com/o/gMdZrUAh" target="_blank" rel="noopener">마잘남 카톡방 참여 →</a>
    </div>

    <div class="cta-block" style="border-color:var(--gold);">
      <span class="cta-tag">스레드 제대로 시작하는 방법</span>
